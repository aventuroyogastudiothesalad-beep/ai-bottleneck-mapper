<!-- Firebase SDK compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // 🔹 Configurazione Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCd0rRTxyrRrZacqayNYFvAQbkGl-AwDQo",
    authDomain: "ai-bottleneck-mapper-b9a9c.firebaseapp.com",
    projectId: "ai-bottleneck-mapper-b9a9c",
    storageBucket: "ai-bottleneck-mapper-b9a9c.firebasestorage.app",
    messagingSenderId: "339570811122",
    appId: "1:339570811122:web:2bf5927f8f2cb2a448706b",
    measurementId: "G-YQ03Y8JMDB",
  };

  // 🔹 Inizializza Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🔹 Variabili globali
  let items = []; // array globale dei bottleneck
  const categories = [
    "Client Requests",
    "Manual Tool Work",
    "Internal Knowledge",
    "Other",
  ];
  const categorySelect = document.getElementById("categorySelect");

  // 🔹 Funzione per caricare i dati da Firestore
  function fetchItems() {
    db.collection("bottlenecks")
      .orderBy("createdAt")
      .get()
      .then((querySnapshot) => {

        // FALLBACK dati locali se Firestore è vuoto
        if (querySnapshot.empty) {
          console.log("Firestore vuoto, uso dati locali di esempio");
          items = [
            {
              process: "Technical Documentation Review",
              problem: "Manual cross-check of .docx assessments",
              impact: "Time-consuming and error-prone",
              agent: "Doc Review AI",
              benefit: "Automates completeness checks",
              category: "Manual Tool Work",
              role: "Product Assessor",
              effort: 7,
              impactScore: 9,
            },
            {
              process: "Client Status Inquiry",
              problem: "Multiple employees answering same client questions",
              impact: "Delays response time",
              agent: "Status Inquiry Bot",
              benefit: "Fast, consistent replies",
              category: "Client Requests",
              role: "Project Manager",
              effort: 3,
              impactScore: 8,
            },
            // puoi aggiungere altri esempi qui
          ];
          render();
          return;
        }

        // Se ci sono dati su Firebase, li carica normalmente
        items = [];
        querySnapshot.forEach((doc) => {
          items.push(doc.data());
        });
        render();
      })
      .catch((error) => console.error("Error fetching items: ", error));
  }

  // 🔹 Funzione per aggiungere una voce
  function addItem() {
    const newItem = {
      process: document.getElementById("process").value,
      problem: document.getElementById("problem").value,
      impact: document.getElementById("impact").value,
      agent: document.getElementById("agent").value,
      benefit: document.getElementById("benefit").value,
      category: document.getElementById("categorySelect").value,
      role: document.getElementById("roleSelect").value,
      effort: parseInt(document.getElementById("effort").value),
      impactScore: parseInt(document.getElementById("impactScore").value),
      createdAt: new Date(),
    };

    if (!newItem.process || !newItem.problem) {
      alert("Fill process and problem");
      return;
    }

    db.collection("bottlenecks")
      .add(newItem)
      .then(() => {
        items.push(newItem); // aggiorna subito localmente
        render();
        clearForm();
      })
      .catch((error) => console.error("Error saving item: ", error));
  }

  // 🔹 Funzione per aggiornare lista, map e matrice
  function addMapColumns() {
    const container = document.getElementById("mapContainer");
    container.innerHTML = "";
    categories.forEach((c) => {
      const div = document.createElement("div");
      div.className = "map-col";
      div.id = "map-" + c.replace(/\s/g, "");
      div.innerHTML = `<h3>${c}</h3>`;
      container.appendChild(div);
    });
  }

  function render() {
    const list = document.getElementById("list");
    const search = document.getElementById("search").value.toLowerCase();
    list.innerHTML = "";
    addMapColumns();

    let count = {};
    categories.forEach((c) => (count[c] = 0));

    items
      .filter((i) => JSON.stringify(i).toLowerCase().includes(search))
      .forEach((i, index) => {
        const div = document.createElement("div");
        div.className = "list-item";
        div.innerHTML = `
<strong>${i.process}</strong>
<span class="tag">${i.category}</span>
<p><b>Role:</b> ${i.role}</p>
<p><b>Problem:</b> ${i.problem}</p>
<p><b>Impact:</b> ${i.impact}</p>
<p><b>AI Agent:</b> ${i.agent}</p>
<p><b>Benefit:</b> ${i.benefit}</p>
<button onclick="removeItem(${index})">Delete</button>
`;
        list.appendChild(div);

        const node = document.createElement("div");
        node.className = "node";
        node.innerHTML = `<strong>${i.agent || "AI Opportunity"}</strong>${i.process} (${i.role})`;
        document
          .getElementById("map-" + i.category.replace(/\s/g, ""))
          .appendChild(node);

        count[i.category]++;

        const e = i.effort;
        const imp = i.impactScore;

        if (e <= 5 && imp <= 5)
          document.getElementById("low-effort-low-impact").innerHTML +=
            `<div class='node'><strong>${i.agent}</strong>${i.process} (${i.role})</div>`;
        if (e > 5 && imp <= 5)
          document.getElementById("high-effort-low-impact").innerHTML +=
            `<div class='node'><strong>${i.agent}</strong>${i.process} (${i.role})</div>`;
        if (e <= 5 && imp > 5)
          document.getElementById("low-effort-high-impact").innerHTML +=
            `<div class='node'><strong>${i.agent}</strong>${i.process} (${i.role})</div>`;
        if (e > 5 && imp > 5)
          document.getElementById("high-effort-high-impact").innerHTML +=
            `<div class='node'><strong>${i.agent}</strong>${i.process} (${i.role})</div>`;
      });

    document.getElementById("total").innerText = items.length;
    document.getElementById("s1").innerText = count["Client Requests"] || 0;
    document.getElementById("s2").innerText = count["Manual Tool Work"] || 0;
    document.getElementById("s3").innerText = count["Internal Knowledge"] || 0;
    document.getElementById("s4").innerText = count["Other"] || 0;
  }

  function removeItem(i) {
    items.splice(i, 1);
    render();
  }

  function exportCSV() {
    let csv = "Process,Problem,Impact,Agent,Benefit,Category,Role\n";
    items.forEach((i) => {
      csv += `"${i.process}","${i.problem}","${i.impact}","${i.agent}","${i.benefit}","${i.category}","${i.role}"\n`;
    });
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "ai_bottlenecks.csv";
    a.click();
  }

  function clearForm() {
    document.getElementById("process").value = "";
    document.getElementById("problem").value = "";
    document.getElementById("impact").value = "";
    document.getElementById("agent").value = "";
    document.getElementById("benefit").value = "";
    document.getElementById("effort").value = 5;
    document.getElementById("impactScore").value = 5;
    document.getElementById("categorySelect").selectedIndex = 0;
    document.getElementById("roleSelect").selectedIndex = 0;
  }

  // 🔹 Carica i dati all’avvio
  fetchItems();
  render();
</script>
